services:
  db:
    image: mysql:8.0
    container_name: blog-db
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: personal_site
    volumes:
      - ./mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:latest
    container_name: blog-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis_data:/data

  umami:
    build:
      context: .
      dockerfile: Dockerfile.umami
    container_name: blog-umami
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_started
    environment:
      DATABASE_URL: mysql://root:${DB_PASSWORD}@db:3306/umami
      APP_SECRET: ${UMAMI_APP_SECRET}
      BASE_PATH: /umami

  frontend:
    build: ../blog-frontend
    container_name: blog-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - umami
    volumes:
      - /etc/ssl/cloudflare:/etc/ssl/cloudflare:ro

  backend:
    build: ../blog-backend
    container_name: blog-backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
      - redis
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/personal_site?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
      TZ: Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
